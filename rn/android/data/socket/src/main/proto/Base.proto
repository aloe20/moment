syntax = "proto3";
package aloe.proto;
option java_package = "com.aloe.proto";
option java_outer_classname = "SocketData";
//option java_multiple_files = true;
import "google/protobuf/struct.proto";
import "msg.proto";
message Head {
    int32 versionCode = 1;
    Msg msg = 2;
}

message Body {
    bytes data = 1;
    google.protobuf.Struct extra = 2;
}

message Base {
    Head head = 1;
    Body body = 2;
}
